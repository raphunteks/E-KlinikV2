<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klinik Utama Axa - Enterprise System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#204498', branddark: '#163273', medgreen: '#059669' } } } }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fb; color: #334155; overflow: hidden; }
        
        .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-med { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
        .input-med:focus { border-color: #204498; box-shadow: 0 0 0 3px rgba(32,68,152,0.1); }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; } 
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid #204498; border-radius: 50%; width: 44px; height: 44px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Table Styles */
        .med-table th { background: #f8fafc; padding: 12px; font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; text-align: left;}
        .med-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        
        @media print { 
            body, html { background: white !important; overflow: visible !important; height: auto !important; }
            body * { visibility: hidden; } 
            #printArea, #printArea * { visibility: visible; } 
            #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin:0; } 
            .no-print { display: none !important; } 
        }
    </style>
</head>
<body class="h-screen w-screen relative">

    <div id="globalLoader" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-[99999] flex flex-col items-center justify-center hidden">
        <div class="loader mb-4"></div>
        <p class="text-brand font-bold" id="loaderText">Sinkronisasi Data...</p>
    </div>

    <!-- VIEW 1: LOGIN -->
    <div id="viewLogin" class="fixed inset-0 flex items-center justify-center bg-brand z-[50] overflow-y-auto p-4">
        <div class="bg-white w-full max-w-[400px] p-8 rounded-2xl shadow-2xl relative my-8">
            <div id="apiWarning" class="hidden bg-red-50 border border-red-200 text-red-600 p-3 rounded-lg mb-4 text-xs font-bold text-center">
                ⚠️ URL Google Apps Script belum diatur (GAS_URL)!
            </div>
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-brand rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-clinic-medical text-white text-4xl"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800">Axa Enterprise</h1>
                <p class="text-xs font-bold text-slate-400 mt-1 uppercase">Sistem Klinik Terpadu</p>
            </div>
            
            <div class="flex mb-6 bg-slate-100 p-1 rounded-lg">
                <button type="button" onclick="switchTab('staff')" id="tabStaff" class="flex-1 py-2.5 rounded bg-white text-xs font-bold text-brand shadow-sm">STAF MEDIS</button>
                <button type="button" onclick="switchTab('pasien')" id="tabPasien" class="flex-1 py-2.5 rounded text-xs font-bold text-slate-400">PASIEN</button>
            </div>
            
            <form id="formStaff" onsubmit="handleLogin(event, 'staff')" class="space-y-4">
                <div><label>ID Pengguna</label><div class="relative"><i class="fas fa-user absolute left-3 top-3 text-slate-400"></i><input type="text" id="username" class="input-med pl-10" required></div></div>
                <div><label>Kata Sandi</label><div class="relative"><i class="fas fa-lock absolute left-3 top-3 text-slate-400"></i><input type="password" id="password" class="input-med pl-10" required></div></div>
                <button type="submit" class="w-full bg-brand text-white font-bold py-3 rounded-lg hover:bg-branddark transition-colors mt-2">MASUK <i class="fas fa-arrow-right ml-1"></i></button>
            </form>
            
            <form id="formPasien" onsubmit="handleLoginPasien(event)" class="space-y-4 hidden">
                <div><label>No Rekam Medis (RM)</label><input type="text" id="p_rm" class="input-med uppercase" required placeholder="RM-XXXX-XXXX"></div>
                <div><label>Tanggal Lahir</label><input type="date" id="p_dob" class="input-med" required></div>
                <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-900 transition-colors mt-2">CEK BERKAS</button>
            </form>
        </div>
    </div>

    <!-- VIEW 2: PORTAL PASIEN (TRACKER) -->
    <div id="viewTracker" class="fixed inset-0 bg-slate-50 hidden z-[45] overflow-y-auto">
        <div class="bg-brand text-white p-6 text-center relative border-b-4 border-yellow-400">
            <h1 class="text-2xl font-black">PORTAL PASIEN</h1>
            <p class="text-blue-200 font-bold text-sm mt-1" id="pasienPortalName">User</p>
            <button type="button" onclick="logoutPasien()" class="absolute top-6 right-6 text-white hover:text-red-300"><i class="fas fa-power-off text-xl"></i></button>
        </div>
        <div class="p-6 max-w-4xl mx-auto space-y-6">
            <div class="card p-6">
                <h3 class="font-bold text-brand mb-4 border-b pb-2"><i class="fas fa-history mr-2"></i> Riwayat Kunjungan & CPPT</h3>
                <div id="pasienHistoryList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- VIEW 3: MAIN APP (STAFF) -->
    <div id="mainApp" class="fixed inset-0 flex hidden bg-slate-50 z-[40]">
        <!-- Mobile Sidebar Backdrop -->
        <div id="sidebarBackdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

        <!-- SIDEBAR -->
        <aside class="fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 w-[260px] bg-white border-r border-slate-200 flex flex-col z-50 transition-transform shadow-xl lg:shadow-none" id="sidebar">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between lg:justify-start gap-3">
                <div class="w-8 h-8 bg-brand rounded-lg flex justify-center items-center"><i class="fas fa-clinic-medical text-white text-xs"></i></div>
                <span class="font-black text-lg text-brand">AXA KLINIK</span>
                <button type="button" onclick="toggleSidebar()" class="lg:hidden text-slate-400 p-2"><i class="fas fa-times text-lg"></i></button>
            </div>
            <div class="p-4 mx-3 mt-4 bg-slate-50 rounded-xl border border-slate-100 flex items-center gap-3">
                <img src="" id="userAvatar" class="w-10 h-10 rounded-lg bg-white border border-slate-200">
                <div class="overflow-hidden"><p class="text-sm font-bold text-slate-800 truncate" id="userName">User</p><p class="text-[10px] text-brand font-bold uppercase truncate" id="userRole">Role</p></div>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="navMenu"></nav>
            <div class="p-4 border-t border-slate-100">
                <button type="button" onclick="logout()" class="flex items-center justify-center gap-2 w-full py-3 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white rounded-lg font-bold text-xs transition-colors"><i class="fas fa-power-off"></i> KELUAR</button>
            </div>
        </aside>

        <!-- WORK AREA -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            <header class="bg-white border-b border-slate-200 h-14 flex items-center px-4 lg:hidden sticky top-0 z-20">
                <button type="button" onclick="toggleSidebar()" class="p-2 text-slate-600"><i class="fas fa-bars text-lg"></i></button>
                <span class="font-bold text-brand mx-auto">Menu Utama</span>
            </header>
            <div class="flex-1 h-full overflow-y-auto p-4 md:p-6 lg:p-8" id="workArea"></div>
        </main>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        // =========================================================================
        // WAJIB DIISI: URL GOOGLE APPS SCRIPT WEB APP
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx-KH2mUhhcenjlnxLoMRcsaFl1sQdzS609ebcxFYqToXrWkZBt3kDTx6NNDwmpXi0/exec"; 

        if(GAS_URL === "ISI_URL_WEB_APP_ANDA_DISINI") document.getElementById('apiWarning').classList.remove('hidden');

        // --- FETCH API CLIENT ---
        const ZettBackend = {
            call: async function(funcName, ...args) {
                if (GAS_URL === "ISI_URL_WEB_APP_ANDA_DISINI") return { status: 'error', message: 'URL API belum diatur.' };
                let dataPayload = {};
                if (funcName === 'doLogin') { dataPayload = { username: args[0], password: args[1] }; }
                else if (funcName === 'loginPasien') { dataPayload = { noRM: args[0], tglLahir: args[1] }; }
                else if (funcName === 'searchObatBackend') { dataPayload = { keyword: args[0] }; }
                else if (funcName === 'getRiwayatCPPT') { dataPayload = { noRM: args[0] }; }
                else if (args.length > 0 && typeof args[0] === 'object') { dataPayload = args[0]; }

                try {
                    const response = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: funcName, data: dataPayload }) });
                    return await response.json();
                } catch (err) { return { status: 'error', message: 'Koneksi ke Server terputus.' }; }
            }
        };

        let AppState = { user: null, charts: {} };
        
        const UI = {
            loader: (show, text = 'Memproses...') => {
                const el = document.getElementById('globalLoader');
                if(show) { document.getElementById('loaderText').textContent = text; el.classList.remove('hidden'); } 
                else { el.classList.add('hidden'); }
            },
            toast: (msg, isErr=false) => {
                const div = document.createElement('div');
                div.className = `fixed top-4 right-4 md:bottom-6 md:right-6 md:top-auto ${isErr ? 'bg-red-600' : 'bg-slate-800'} text-white px-5 py-3 rounded-lg shadow-xl z-[99999] font-bold flex items-center gap-3 text-sm`;
                div.innerHTML = `<i class="fas ${isErr ? 'fa-times-circle' : 'fa-check-circle'} text-lg"></i> <div>${msg}</div>`;
                document.body.appendChild(div);
                setTimeout(() => { div.remove(); }, 3500);
            }
        };

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const bd = document.getElementById('sidebarBackdrop');
            sb.classList.toggle('-translate-x-full');
            if(sb.classList.contains('-translate-x-full')) bd.classList.add('hidden'); else bd.classList.remove('hidden');
        }

        function switchTab(t) {
            document.getElementById('formStaff').style.display = t === 'staff' ? 'block' : 'none';
            document.getElementById('formPasien').style.display = t === 'pasien' ? 'block' : 'none';
            document.getElementById('tabStaff').className = t==='staff'?'flex-1 py-2.5 rounded bg-white text-xs font-bold text-brand shadow-sm':'flex-1 py-2.5 rounded text-xs font-bold text-slate-400 bg-transparent';
            document.getElementById('tabPasien').className = t!=='staff'?'flex-1 py-2.5 rounded bg-white text-xs font-bold text-brand shadow-sm':'flex-1 py-2.5 rounded text-xs font-bold text-slate-400 bg-transparent';
        }

        async function handleLogin(e, t) {
            e.preventDefault(); UI.loader(true, 'Otentikasi...');
            try {
                const res = await ZettBackend.call('doLogin', document.getElementById('username').value, document.getElementById('password').value);
                if(res && res.status === 'success' && res.user) {
                    AppState.user = res.user;
                    document.getElementById('viewLogin').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('userName').textContent = res.user.name;
                    document.getElementById('userRole').textContent = res.user.role;
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(res.user.name)}&background=f1f5f9&color=204498&bold=true`;
                    renderMenu(); loadView(res.user.role === 'Super Admin' ? 'dashboard' : 'frontdesk');
                } else UI.toast(res?.message || 'Gagal Login', true);
            } catch (err) { UI.toast('Error API: ' + err.message, true); }
            UI.loader(false);
        }

        async function handleLoginPasien(e) {
            e.preventDefault(); UI.loader(true, 'Mencari Berkas...');
            try {
                const res = await ZettBackend.call('loginPasien', document.getElementById('p_rm').value, document.getElementById('p_dob').value);
                if(res && res.status === 'success' && res.pasien) {
                    document.getElementById('viewLogin').classList.add('hidden');
                    document.getElementById('viewTracker').classList.remove('hidden');
                    document.getElementById('pasienPortalName').textContent = res.pasien.nama + ' (' + res.pasien.rm + ')';
                    const hl = document.getElementById('pasienHistoryList');
                    if(!res.history || res.history.length === 0) hl.innerHTML = '<div class="card p-6 text-center text-slate-500 font-bold">Belum ada riwayat medis.</div>';
                    else hl.innerHTML = res.history.map(h => `<div class="card p-4 border-l-4 border-brand"><div class="flex justify-between items-center mb-2"><span class="text-xs font-bold text-slate-400"><i class="far fa-calendar-alt"></i> ${h.tgl}</span><span class="text-[10px] font-bold text-brand bg-blue-50 px-2 py-1 rounded"><i class="fas fa-user-md"></i> ${h.dokter}</span></div><p class="font-bold text-slate-700 text-sm">${h.diag}</p></div>`).join('');
                } else UI.toast(res?.message || 'Data tidak ditemukan', true);
            } catch (err) { UI.toast('Error API', true); }
            UI.loader(false);
        }

        function logout() { 
            AppState.user = null; document.getElementById('mainApp').classList.add('hidden'); document.getElementById('viewLogin').classList.remove('hidden'); 
            if(window.Chart) { Object.values(AppState.charts).forEach(c=>c.destroy()); AppState.charts={}; }
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.add('-translate-x-full'); 
            document.getElementById('formStaff').reset(); document.getElementById('workArea').innerHTML = ''; 
        }
        function logoutPasien() { document.getElementById('viewTracker').classList.add('hidden'); document.getElementById('viewLogin').classList.remove('hidden'); document.getElementById('formPasien').reset(); }

        const Menus = [
            { id: 'dashboard', label: 'Dashboard & Laporan', icon: 'fa-chart-bar', roles: ['Super Admin'] },
            { id: 'frontdesk', label: 'Pendaftaran (Frontdesk)', icon: 'fa-user-plus', roles: ['Super Admin', 'Frontdesk'] },
            { id: 'antrian', label: 'Display Antrian', icon: 'fa-tv', roles: ['Super Admin', 'Frontdesk'] },
            { id: 'rme', label: 'RME & CPPT', icon: 'fa-stethoscope', roles: ['Super Admin', 'Dokter'] },
            { id: 'lab', label: 'Laboratorium', icon: 'fa-microscope', roles: ['Super Admin', 'Dokter', 'Analis Lab'] },
            { id: 'kasir', label: 'Kasir Pembayaran', icon: 'fa-cash-register', roles: ['Super Admin', 'Kasir'] },
            { id: 'farmasi', label: 'Manajemen Farmasi', icon: 'fa-pills', roles: ['Super Admin', 'Apoteker'] },
            { id: 'surat', label: 'Surat & Consent', icon: 'fa-file-signature', roles: ['Super Admin', 'Dokter', 'Frontdesk'] }
        ];

        function renderMenu() {
            const nav = document.getElementById('navMenu'); nav.innerHTML = '';
            Menus.forEach(m => {
                if(AppState.user?.role && m.roles.includes(AppState.user.role)) {
                    nav.innerHTML += `<button type="button" onclick="loadView('${m.id}')" data-target="${m.id}" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors font-bold text-xs text-slate-500 hover:bg-slate-100 hover:text-brand w-full text-left outline-none mb-1"><i class="fas ${m.icon} w-5 text-center text-sm opacity-70"></i> <span>${m.label}</span></button>`;
                }
            });
        }

        function loadView(vid) {
            if(window.innerWidth < 1024) toggleSidebar(); 
            document.querySelectorAll('#navMenu button').forEach(a => {
                if(a.dataset.target === vid) { a.classList.add('bg-brand','text-white','shadow-md'); a.classList.remove('text-slate-500','hover:bg-slate-100'); a.querySelector('i').classList.remove('opacity-70'); }
                else { a.classList.remove('bg-brand','text-white','shadow-md'); a.classList.add('text-slate-500','hover:bg-slate-100'); a.querySelector('i').classList.add('opacity-70'); }
            });
            const wa = document.getElementById('workArea'); wa.innerHTML = ''; 
            
            try {
                if(vid === 'dashboard') buildDashboard(wa);
                else if(vid === 'frontdesk') buildFrontdesk(wa);
                else if(vid === 'antrian') buildAntrian(wa);
                else if(vid === 'rme') buildRME(wa);
                else if(vid === 'lab') buildLab(wa);
                else if(vid === 'kasir') buildKasir(wa);
                else if(vid === 'farmasi') buildFarmasi(wa);
                else if(vid === 'surat') buildSurat(wa);
            } catch(e) { UI.toast("Error Render View", true); console.error(e);}
        }

        // ==========================================
        // MODULE BUILDERS (HOSPITAL GRADE UPGRADE)
        // ==========================================

        async function buildDashboard(container) {
            container.innerHTML = `
                <div class="mb-6"><h2 class="text-2xl font-black text-slate-800">Dashboard & Laporan</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="card p-6 flex justify-between items-center border-l-4 border-l-brand">
                        <div><p class="text-xs text-slate-400 font-bold uppercase">Total Pendapatan</p><h3 class="text-3xl font-black text-slate-800 mt-1" id="dashRev">Rp 0</h3></div>
                        <div class="w-14 h-14 bg-blue-50 text-brand rounded-full flex items-center justify-center text-2xl"><i class="fas fa-wallet"></i></div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                    <div class="card p-6"><h3 class="font-bold text-slate-800 mb-4 text-sm uppercase">Tren Pendapatan</h3><div class="relative h-64"><canvas id="revChart"></canvas></div></div>
                    <div class="card p-6"><h3 class="font-bold text-slate-800 mb-4 text-sm uppercase">Rekap Index Penyakit</h3>
                        <div class="overflow-x-auto"><table class="w-full med-table"><thead><tr><th>Kode ICD10</th><th>Jumlah Kasus</th></tr></thead><tbody id="tblPenyakit"></tbody></table></div>
                    </div>
                </div>
            `;
            UI.loader(true); const res = await ZettBackend.call('getDashboardData'); UI.loader(false);
            if(res && res.status==='success' && res.data) {
                document.getElementById('dashRev').innerText = 'Rp ' + (res.data.totalPendapatan || 0).toLocaleString('id-ID');
                
                let tbody = document.getElementById('tblPenyakit');
                if(res.data.laporanPenyakit && res.data.laporanPenyakit.length > 0){
                    tbody.innerHTML = res.data.laporanPenyakit.map(p => `<tr><td class="font-bold text-brand">${p.icd}</td><td class="text-center font-bold bg-slate-50">${p.jumlah}</td></tr>`).join('');
                } else tbody.innerHTML = '<tr><td colspan="2" class="text-center">Belum ada data</td></tr>';

                if(typeof Chart !== 'undefined') {
                    if(AppState.charts.rev) AppState.charts.rev.destroy();
                    AppState.charts.rev = new Chart(document.getElementById('revChart'), { type: 'line', data: { labels: res.data.chartBulan||[], datasets: [{ label: 'Rp', data: res.data.chartPendapatan||[], borderColor: '#204498', fill: false, tension: 0.1, borderWidth: 3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display: false} } }});
                }
            }
        }

        function buildFrontdesk(container) {
            container.innerHTML = `
                <div class="mb-6"><h2 class="text-2xl font-black text-slate-800">Buat Registrasi Pasien</h2></div>
                <div class="card p-6 md:p-8 max-w-4xl mx-auto">
                    <form onsubmit="submitDaftar(event)" id="fDaftar">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
                            <!-- Data Diri -->
                            <div class="space-y-4">
                                <h4 class="font-bold text-brand text-sm border-b pb-2"><i class="fas fa-user mr-2"></i> Data Diri Pasien</h4>
                                <div><label>Nama Pasien *</label><input type="text" id="r_nama" class="input-med font-bold text-slate-800" required></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label>Tanggal Lahir</label><input type="date" id="r_dob" class="input-med" required></div>
                                    <div><label>Jenis Kelamin</label><select id="r_jk" class="input-med"><option>Laki-Laki</option><option>Perempuan</option></select></div>
                                </div>
                                <div><label>NIK *</label><input type="number" id="r_nik" class="input-med" required></div>
                                <div><label>Nomor BPJS (Opsional)</label><input type="number" id="r_bpjs" class="input-med"></div>
                                <div><label>No Handphone</label><input type="tel" id="r_hp" class="input-med" required></div>
                                <div><label>Alamat Lengkap</label><textarea id="r_alamat" class="input-med resize-none" rows="2"></textarea></div>
                            </div>
                            
                            <!-- Kunjungan -->
                            <div class="space-y-4">
                                <h4 class="font-bold text-brand text-sm border-b pb-2"><i class="fas fa-stethoscope mr-2"></i> Data Kunjungan</h4>
                                <div><label>Poli Tujuan *</label><select id="r_poli" class="input-med font-bold text-slate-700 bg-slate-50"><option>Poli Umum</option><option>Poli Gigi</option><option>IGD</option></select></div>
                                <div><label>Pembiayaan</label><select id="r_biaya" class="input-med"><option>PRIBADI</option><option>BPJS KESEHATAN</option><option>ASURANSI LAIN</option></select></div>
                                <div><label>Keluhan Utama</label><textarea id="r_keluhan" class="input-med resize-none" rows="3"></textarea></div>
                                
                                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mt-6">
                                    <button type="submit" class="w-full bg-brand text-white font-black py-4 rounded-lg shadow-md hover:bg-branddark transition-colors"><i class="fas fa-save mr-2"></i> SIMPAN REGISTRASI</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            `;
        }
        window.submitDaftar = async (e) => { 
            e.preventDefault(); UI.loader(true);

                            <div>
                                <label>Aturan Pakai / Dosis</label>
                                <div class="grid grid-cols-3 gap-3">
                                    <label class="bg-white border p-3 rounded-lg text-center cursor-pointer font-bold shadow-sm hover:border-brand transition"><input type="checkbox" id="d_pagi" class="mr-1"> Pagi</label>
                                    <label class="bg-white border p-3 rounded-lg text-center cursor-pointer font-bold shadow-sm hover:border-brand transition"><input type="checkbox" id="d_siang" class="mr-1"> Siang</label>
                                    <label class="bg-white border p-3 rounded-lg text-center cursor-pointer font-bold shadow-sm hover:border-brand transition"><input type="checkbox" id="d_sore" class="mr-1"> Malam</label>
                                </div>
                            </div>
                            <div class="pt-4"><button type="submit" class="w-full bg-brand text-white font-black py-4 rounded-xl shadow-md hover:bg-branddark transition-colors">SELESAI & SERAHKAN OBAT</button></div>
                        </form>
                    </div>
                </div>
            `;
            cariObat(""); 
        }
        window.cariObat = async (val="") => { const c = document.getElementById('hasilCariObat'); if(val!=="") c.innerHTML = '<tr><td colspan="5" class="text-center py-4"><i class="fas fa-spinner fa-spin text-brand"></i></td></tr>'; try { const res = await ZettBackend.call('searchObatBackend', val); if(res && res.status === 'success') { if(!res.data || res.data.length === 0) c.innerHTML = '<tr><td colspan="5" class="text-center text-red-500 font-bold py-4">Tidak ditemukan</td></tr>'; else c.innerHTML = res.data.map(o => `<tr><td class="font-mono text-xs">${o.id}</td><td class="font-bold text-slate-700">${o.nama} <span class="bg-slate-100 px-2 py-0.5 rounded text-[10px] ml-1">${o.kategori}</span></td><td><span class="${o.stok <= o.min ? 'text-white bg-red-500 px-2 py-1 rounded':'text-green-600 font-bold'}">${o.stok}</span></td><td class="text-xs text-slate-500">${o.exp} / ${o.batch}</td><td><button type="button" onclick="document.getElementById('f_id').value='${o.id}'" class="bg-blue-50 text-brand border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-brand hover:text-white transition">Pilih</button></td></tr>`).join(''); } } catch(err) {} };
        window.submitDispense = async (e) => { e.preventDefault(); const idObat = document.getElementById('f_id').value; if(!idObat) return UI.toast('Pilih obat!', true); let dArr = []; if(document.getElementById('d_pagi').checked) dArr.push('Pagi'); if(document.getElementById('d_siang').checked) dArr.push('Siang'); if(document.getElementById('d_sore').checked) dArr.push('Malam'); const p = { idObat: idObat, qty: document.getElementById('f_qty').value, dosis: dArr.length ? dArr.join(', ') : 'Anjuran Dokter', apoteker: AppState.user?.name || 'Apoteker' }; UI.loader(true, 'API Dispense...'); try { const res = await ZettBackend.call('dispenseObat', p); UI.loader(false); if(res && res.status==='success') { UI.toast(res.message); cariObat(""); document.getElementById('f_qty').value=''; document.getElementById('f_id').value=''; } else UI.toast(res?.message, true); } catch(err) { UI.loader(false); } };

        // Lab, Surat, Consent (Preserved logic, adapting simple UI)
        function buildLab(c) { c.innerHTML = `<div class="mb-6"><h2 class="text-2xl font-black text-slate-800">Hasil Laboratorium</h2></div><div class="card p-6 md:p-8 max-w-3xl mx-auto"><form onsubmit="submitLab(event)" id="fLab" class="space-y-6"><div><label>ID Pendaftaran</label><input type="text" id="l_id" class="input-med font-bold" required placeholder="REG-..."></div><h4 class="font-bold text-brand border-b pb-2">Hematologi Rutin</h4><div class="grid grid-cols-2 gap-4"><div><label>Hemoglobin</label><input type="number" step="0.1" id="l_hb" class="input-med" required></div><div><label>Leukosit</label><input type="number" step="0.1" id="l_leuko" class="input-med" required></div><div><label>Trombosit</label><input type="number" id="l_trombo" class="input-med" required></div><div><label>Gula Darah</label><input type="number" id="l_gula" class="input-med bg-yellow-50" required></div></div><button type="submit" class="w-full bg-brand text-white font-black py-4 rounded-lg shadow-md hover:bg-branddark"><i class="fas fa-print mr-2"></i> SIMPAN & CETAK</button></form></div>`; }
        window.submitLab = async (e) => { e.preventDefault(); const p = { idDaftar: document.getElementById('l_id').value, hb: document.getElementById('l_hb').value, leuko: document.getElementById('l_leuko').value, trombo: document.getElementById('l_trombo').value, gula: document.getElementById('l_gula').value, kolesterol: 0, petugas: AppState.user?.name || 'Analis' }; UI.loader(true); try { const res = await ZettBackend.call('saveLabResult', p); UI.loader(false); if(res && res.status==='success') { UI.toast(res.message); document.getElementById('fLab').reset(); const pa = document.getElementById('printArea'); pa.innerHTML = `<div style="width:100%; max-width:800px; margin:0 auto; padding:40px; font-family:sans-serif;"><div style="text-align:center; border-bottom:4px solid #1e40af; padding-bottom:10px; margin-bottom:20px;"><h1 style="color:#1e40af; margin:0; font-size:24px;">KLINIK AXA ENTERPRISE - LABORATORIUM</h1><p style="margin:5px 0 0 0; font-size:12px;">Jl. Raya Medika No. 1</p></div><h2 style="text-align:center; text-decoration:underline;">HASIL LAB</h2><p><strong>ID Daftar:</strong> ${p.idDaftar}</p><table style="width:100%; border-collapse:collapse; margin-top:20px;" border="1"> <tr style="background:#f3f4f6;"> <th style="padding:10px;">Pemeriksaan</th> <th style="padding:10px;">Hasil</th> </tr> <tr> <td style="padding:10px;">Hemoglobin</td> <td style="padding:10px; text-align:center;">${p.hb}</td> </tr> <tr> <td style="padding:10px;">Leukosit</td> <td style="padding:10px; text-align:center;">${p.leuko}</td> </tr> <tr> <td style="padding:10px;">Trombosit</td> <td style="padding:10px; text-align:center;">${p.trombo}</td> </tr> <tr> <td style="padding:10px;">Gula Darah</td> <td style="padding:10px; text-align:center; font-weight:bold;">${p.gula}</td> </tr></table></div>`; window.print(); } } catch(err) { UI.loader(false); } };
        
        function buildSurat(c) { c.innerHTML = `<div class="mb-6"><h2 class="text-2xl font-black text-slate-800">Surat & Consent</h2></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="card p-6"><h3 class="font-bold border-b pb-2 mb-4">Penerbitan Surat</h3><form onsubmit="submitSurat(event)" id="fSurat" class="space-y-4"><div><label>No RM Pasien</label><input type="text" id="s_rm" class="input-med" required></div><div><label>Jenis</label><select id="s_tipe" class="input-med"><option value="Sakit">Surat Sakit</option><option value="Sehat">Surat Sehat</option></select></div><div><label>Keterangan</label><textarea id="s_ket" class="input-med" rows="2" required></textarea></div><button type="submit" class="w-full bg-brand text-white font-bold py-3 rounded-lg">Cetak Surat</button></form></div><div class="card p-6"><h3 class="font-bold border-b pb-2 mb-4">Informed Consent</h3><p class="text-xs mb-4 text-justify">Saya menyetujui tindakan medis sesuai SOP klinik...</p><div class="mb-4"><label>No RM Pasien</label><input type="text" id="ic_rm" class="input-med" required></div><div class="mb-4"><label>Tanda Tangan</label><div class="border rounded-lg bg-slate-50 relative"><canvas id="signatureCanvas" width="300" height="150" class="w-full h-auto cursor-crosshair"></canvas><button type="button" onclick="document.getElementById('signatureCanvas').getContext('2d').clearRect(0,0,300,150)" class="absolute top-2 right-2 text-[10px] bg-white border px-2 py-1 rounded shadow-sm">Clear</button></div></div><button onclick="submitConsent()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">Simpan Legitimasi</button></div></div>`; 
            setTimeout(() => { const cvs = document.getElementById('signatureCanvas'); if(cvs) { const ctx = cvs.getContext('2d'); ctx.lineWidth = 3; let draw = false; const pos = (e) => { const r = cvs.getBoundingClientRect(); const sX = cvs.width / r.width; const sY = cvs.height / r.height; const x = e.touches ? e.touches[0].clientX : e.clientX; const y = e.touches ? e.touches[0].clientY : e.clientY; return { x: (x - r.left) * sX, y: (y - r.top) * sY }; }; const start = (e) => { e.preventDefault(); draw = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }; const move = (e) => { e.preventDefault(); if(!draw) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }; cvs.addEventListener('mousedown', start); cvs.addEventListener('mousemove', move); cvs.addEventListener('mouseup', ()=>draw=false); cvs.addEventListener('touchstart', start, {passive:false}); cvs.addEventListener('touchmove', move, {passive:false}); cvs.addEventListener('touchend', ()=>draw=false); } }, 100);
        }
        window.submitSurat = async (e) => { e.preventDefault(); const p = { noRM: document.getElementById('s_rm').value, tipe: document.getElementById('s_tipe').value, keterangan: document.getElementById('s_ket').value, dokter: AppState.user?.name || 'Dokter' }; UI.loader(true); try { const res = await ZettBackend.call('saveSuratKet', p); UI.loader(false); if(res && res.status==='success') { UI.toast(res.message); document.getElementById('fSurat').reset(); const pa = document.getElementById('printArea'); pa.innerHTML = `<div style="width:100%; max-width:800px; margin:0 auto; padding:40px; font-family:'Times New Roman', serif; line-height:1.6;"><div style="text-align:center; border-bottom:4px solid #000; padding-bottom:10px; margin-bottom:20px;"><h1 style="margin:0; font-size:24px;">KLINIK AXA ENTERPRISE</h1></div><h3 style="text-align:center; text-decoration:underline;">SURAT ${p.tipe}</h3><p style="margin-top:20px;">Pasien RM: <strong>${p.noRM}</strong>, menerangkan:</p><div style="padding:15px; border:1px solid #ddd; margin:15px 0;">${p.keterangan}</div><div style="margin-top:40px; float:right; text-align:center;"><p>Dokter Pemeriksa,</p><br><br><br><p style="text-decoration:underline; font-weight:bold;">${p.dokter}</p></div></div>`; window.print(); } } catch(err) { UI.loader(false); } };
        window.submitConsent = async () => { const p = { idDaftar: "MANUAL", noRM: document.getElementById('ic_rm').value || "TIDAK DIISI", base64TTD: document.getElementById('signatureCanvas').toDataURL(), petugas: AppState.user?.name || 'Staff' }; UI.loader(true); try { const res = await ZettBackend.call('saveConsent', p); UI.loader(false); if(res && res.status==='success') { UI.toast(res.message); document.getElementById('signatureCanvas').getContext('2d').clearRect(0,0,300,150); document.getElementById('ic_rm').value=''; } } catch(err) { UI.loader(false); } };
    </script>
</body>
</html>
